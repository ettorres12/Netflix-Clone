<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>

    <link rel="stylesheet" href="catalogo.css">

    <!-- Ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <img class="logo"
                src="../assets/logo-Netflix.svg"
                alt="Netflix">

            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="active">Início</a></li>
                    <li><a href="#">Séries</a></li>
                    <li><a href="#">Filmes</a></li>
                    <li><a href="#">Jogos</a></li>
                    <li><a href="#">Bombando</a></li>
                    <li><a href="#">Minha lista</a></li>
                </ul>
            </nav>
        </div>

        <div class="navbar-right">
            <i class="fas fa-search icon"></i>

            <!-- Nome do perfil -->
            <a href="../index.html" class="kids-link">Seu nome</a>

            <!-- Notificação -->
            <div class="nav-notification">
                <i class="fas fa-bell icon"></i>
                <span class="notification-badge">10</span>
            </div>

            <!-- Perfil -->
            <a href="../index.html" class="profile-menu" style="text-decoration: none; color: inherit;">
                <img class="profile-icon" src="../assets/default-profile.png" alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <!-- Conteúdo (carrosséis) -->
    <main class="sliders-container" id="main-content">
        <!-- JS vai inserir aqui -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>© 2026 Netflix Clone. Todos os direitos reservados.</p>

            <ul class="footer-links">
                <li><a href="#">Perguntas frequentes</a></li>
                <li><a href="#">Centro de ajuda</a></li>
                <li><a href="#">Conta</a></li>
                <li><a href="#">Imprensa</a></li>
                <li><a href="#">Carreiras</a></li>
                <li><a href="#">Privacidade</a></li>
                <li><a href="#">Termos de uso</a></li>
            </ul>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="catalogo.js"></script>
    <script type="module" src="js/main.js"></script>

</body>
</html>
